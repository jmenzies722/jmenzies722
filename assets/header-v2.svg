<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" role="img" aria-label="Josh Menzies — Platform Engineer building the infrastructure AI agents run on. Agentic frameworks, developer productivity, production-grade AI.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1013"/>
      <stop offset="1" stop-color="#08090b"/>
    </linearGradient>
    <style>
      .n { font-family: -apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 600; }
      .t { font-family: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 400; }
      .h { font-family: -apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 600; }
    </style>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>

  <!-- layers emblem (on-brand: the layer AI agents run on) -->
  <g transform="translate(600,40)" stroke="#7d8590" fill="none" stroke-width="1.3" stroke-linejoin="round">
    <polygon points="0,-16 26,-5 0,6 -26,-5" fill="#aeb4bd" fill-opacity="0.10"/>
    <polygon points="0,-5 26,6 0,17 -26,6" fill="#aeb4bd" fill-opacity="0.07"/>
    <polygon points="0,6 26,17 0,28 -26,17" fill="#aeb4bd" fill-opacity="0.05"/>
  </g>

  <!-- hero -->
  <text x="600" y="128" text-anchor="middle" class="n" font-size="46" fill="#f5f5f7" letter-spacing="0.5">Josh M.</text>
  <text x="600" y="166" text-anchor="middle" class="t" font-size="17.5" fill="#86868b" letter-spacing="0.3">Platform Engineer &#8201;&#8212;&#8201; building the infrastructure AI agents run on</text>

  <!-- capabilities (same continuous panel) -->
  <line x1="400" y1="236" x2="400" y2="384" stroke="#20242a" stroke-width="1"/>
  <line x1="800" y1="236" x2="800" y2="384" stroke="#20242a" stroke-width="1"/>

  <!-- Column 1 -->
  <g transform="translate(200,258)" stroke="#aeb4bd" fill="none" stroke-width="1.5">
    <circle cx="-16" cy="-6" r="4"/><circle cx="16" cy="-6" r="4"/><circle cx="0" cy="12" r="4"/>
    <line x1="-13" y1="-4" x2="-2" y2="9"/><line x1="13" y1="-4" x2="2" y2="9"/><line x1="-12" y1="-6" x2="12" y2="-6"/>
  </g>
  <text x="200" y="308" text-anchor="middle" class="h" font-size="19" fill="#f5f5f7">Agentic frameworks</text>
  <text text-anchor="middle" class="t" font-size="13" fill="#86868b">
    <tspan x="200" y="337">MCP servers, governance, and</tspan>
    <tspan x="200" y="356">harnesses that let agents operate</tspan>
    <tspan x="200" y="375">safely inside real codebases</tspan>
  </text>

  <!-- Column 2 -->
  <g transform="translate(600,252)" stroke="#aeb4bd" fill="none" stroke-width="1.5" stroke-linecap="round">
    <line x1="-18" y1="0" x2="18" y2="0"/>
    <line x1="-18" y1="8" x2="10" y2="8"/>
    <line x1="-18" y1="16" x2="2" y2="16"/>
  </g>
  <text x="600" y="308" text-anchor="middle" class="h" font-size="19" fill="#f5f5f7">Developer productivity</text>
  <text text-anchor="middle" class="t" font-size="13" fill="#86868b">
    <tspan x="600" y="337">Golden-path platforms and internal</tspan>
    <tspan x="600" y="356">tooling that remove the toil so</tspan>
    <tspan x="600" y="375">engineers move faster</tspan>
  </text>

  <!-- Column 3 -->
  <g transform="translate(1000,254)" stroke="#aeb4bd" fill="none" stroke-width="1.5" stroke-linejoin="round">
    <path d="M0,-10 L14,-4 L14,6 C14,14 7,18 0,20 C-7,18 -14,14 -14,6 L-14,-4 Z"/>
    <path d="M-6,4 L-1,9 L7,-2" stroke-width="1.7"/>
  </g>
  <text x="1000" y="308" text-anchor="middle" class="h" font-size="19" fill="#f5f5f7">Production-grade AI</text>
  <text text-anchor="middle" class="t" font-size="13" fill="#86868b">
    <tspan x="1000" y="337">Observability and guardrails</tspan>
    <tspan x="1000" y="356">for AI agents running</tspan>
    <tspan x="1000" y="375">in the wild</tspan>
  </text>
</svg>
