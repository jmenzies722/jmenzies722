      <stop offset="0" stop-color="#0e1013"/>
      <stop offset="1" stop-color="#08090b"/>
    </linearGradient>
    <style>
      .n { font-family: -apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 600; }
